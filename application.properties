# Smart City Recommendation System - Configuration

# Application Settings
app.name=Smart City Recommendation System - Migration Score Analyzer
app.version=1.0.0
app.author=Development Team

# UI Configuration
ui.theme=light
ui.width=1200
ui.height=800

# Scoring Configuration
scoring.algorithm=weighted_sum
scoring.normalize=true

# Data Configuration
data.localStorage=true
data.localPath=data/
data.localities=localities.json
data.favorites=favorites.txt

# Feature Toggles
feature.realTimeUpdate=true
feature.mapIntegration=true
feature.favorites=true
feature.comparison=true
feature.export=true
feature.profilePresets=true

# Logging
logging.level=INFO
logging.file=logs/app.log
