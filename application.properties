# Smart City Recommendation System - Configuration

# Application Settings
app.name=Smart City Recommendation System - Migration Score Analyzer
app.version=1.0.0
app.author=Development Team

# UI Configuration
ui.theme=light
ui.width=1200
ui.height=800

# Scoring Configuration
scoring.algorithm=weighted_sum
scoring.normalize=true

# Data Configuration
data.localStorage=true
data.localPath=data/
data.localities=localities.json
data.favorites=favorites.txt

# Feature Toggles
feature.realTimeUpdate=true
feature.mapIntegration=true
feature.favorites=true
feature.comparison=true
feature.export=true
feature.profilePresets=true

# Live API Providers
api.diagnostics.enabled=true

# Adzuna: city-level job counts
api.adzuna.appId=
api.adzuna.appKey=
api.adzuna.url=https://api.adzuna.com/v1/api/jobs/in/search/1

# OpenRouteService: fast transport duration matrix
api.openrouteservice.key=
api.openrouteservice.matrix.url=https://api.openrouteservice.org/v2/matrix/driving-car

# Geoapify: fast healthcare POI lookup
api.geoapify.key=
api.geoapify.places.url=https://api.geoapify.com/v2/places

# Logging
logging.level=INFO
logging.file=logs/app.log
